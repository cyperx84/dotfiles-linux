# ==========================
# Core Settings
# ==========================

# Change prefix from Ctrl-B to Ctrl-A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",ghostty:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Enable extended keys for Ghostty
set -s extended-keys on
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# Vi mode in copy mode
setw -g mode-keys vi

# Propagate focus events to Neovim
set-option -g focus-events on

# Keep tmux alive after last session closes
set -g detach-on-destroy off

# Terminal pass-through (for images, etc.)
set -gq allow-passthrough on

# Start window numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Preserve current path for splits and new windows
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ==========================
# Navigation & Keybindings
# ==========================

# Vi-style pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+number to select windows (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

# Quick actions without prefix (Alt modifier)
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-x kill-window
bind -n M-Tab last-window
bind -n M-w resize-pane -Z
bind -n M-r break-pane
bind -n M-q detach-client
bind -n M-, copy-mode

# Pane resizing (repeatable)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded."

# ==========================
# Session Management
# ==========================

# Sesh integration
bind -n M-e display-popup -E -w 80% -h 80% "sesh list | fzf | xargs -I {} sesh connect --switch {}"
bind -n M-p switch-client -l

# ==========================
# Plugins
# ==========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'niksingh710/minimal-tmux-status'

# Plugin configuration
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @floax-bind 'p'
set -g @floax-width '60%'
set -g @floax-height '60%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'
set -g @resurrect-strategy-nvim 'session'

# Status bar theme (minimal green)
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#00FF00"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator-str "󱓇"
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-status "bottom"
set -g @minimal-tmux-right false
set -g @minimal-tmux-left true
set -g @minimal-tmux-expanded-icon "󰊓 "
set -g @minimal-tmux-show-expanded-icons-for-all-tabs false
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
