# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# ==========================
# Aerospace-style Window Management Keybindings
# ==========================
# These keybindings are ported from macOS Aerospace window manager
# They supplement (not replace) Omarchy's default bindings

# Enhanced Window Focus (Aerospace style - vim-style navigation)
bind = SHIFT CTRL, H, movefocus, l
bind = SHIFT CTRL, J, movefocus, d
bind = SHIFT CTRL, K, movefocus, u
bind = SHIFT CTRL, L, movefocus, r

# Window Movement (Aerospace style)
bind = SHIFT CTRL ALT, H, movewindow, l
bind = SHIFT CTRL ALT, J, movewindow, d
bind = SHIFT CTRL ALT, K, movewindow, u
bind = SHIFT CTRL ALT, L, movewindow, r

# Layout Controls (Aerospace style)
bind = SHIFT CTRL, E, togglefloating
bind = SHIFT CTRL, V, togglesplit
bind = SHIFT CTRL, W, fullscreen, 0

# Smart Resizing (Aerospace style)
bind = CTRL ALT SUPER, J, resizeactive, 0 -50
bind = CTRL ALT SUPER, K, resizeactive, 0 50
bind = CTRL ALT SUPER, H, resizeactive, -50 0
bind = CTRL ALT SUPER, L, resizeactive, 50 0

# Workspace Navigation (Aerospace style - supplement Omarchy)
bind = SUPER SHIFT, N, workspace, e+1
bind = SUPER SHIFT, P, workspace, e-1

# Monitor Management (Aerospace style)
bind = SHIFT ALT, S, movewindow, mon:-1
bind = SHIFT ALT, G, movewindow, mon:+1

# ==========================
# Home-row Workspace Switching
# ==========================
# Unbind displaced defaults
unbind = SUPER, J  # was: Toggle window split (use SHIFT+CTRL+V instead)
unbind = SUPER, K  # was: Show keybindings (moved to SUPER ALT+K)
unbind = SUPER, L  # was: Toggle workspace layout (moved to SUPER ALT+L)
unbind = SUPER, O  # was: Pop window out (moved to SUPER ALT+O)

# Relocated defaults
bindd = SUPER ALT, K, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER ALT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
bindd = SUPER ALT, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# Home-row workspaces
bind = SUPER, J, workspace, 1
bind = SUPER, K, workspace, 2
bind = SUPER, L, workspace, 3
bind = SUPER, U, workspace, 4
bind = SUPER, I, workspace, 5
bind = SUPER, O, workspace, 6

# Move window to workspace (ALT+SHIFT)
bind = ALT SHIFT, J, movetoworkspace, 1
bind = ALT SHIFT, K, movetoworkspace, 2
bind = ALT SHIFT, L, movetoworkspace, 3
bind = ALT SHIFT, U, movetoworkspace, 4
bind = ALT SHIFT, I, movetoworkspace, 5
bind = ALT SHIFT, O, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, N, movetoworkspace, e+1
bind = ALT SHIFT, P, movetoworkspace, e-1
