# Gruvbox Dark Neon Theme

format = """
[](fg:color_bg1)\
$os\
$username\
[](bg:color_bg2 fg:color_bg1)\
$directory\
[](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[](fg:color_bg3 bg:color_bg4)\
$nodejs\
$rust\
$golang\
$python\
$docker_context\
$kubernetes\
[](fg:color_bg4)\
$line_break\
$character"""

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
color_fg0 = "#fbf1c7"
color_bg1 = "#3c3836"
color_bg2 = "#504945"
color_bg3 = "#665c54"
color_bg4 = "#7c6f64"
color_blue = "#458588"
color_aqua = "#689d6a"
color_green = "#98971a"
color_orange = "#d65d0e"
color_purple = "#b16286"
color_red = "#cc241d"
color_yellow = "#d79921"

[os]
disabled = false
style = "bg:color_bg1 fg:color_fg0"

[os.symbols]
Arch = "󰣇 "
Debian = " "
Ubuntu = " "
Linux = " "

[username]
show_always = true
style_user = "bg:color_bg1 fg:color_fg0"
style_root = "bg:color_bg1 fg:color_red"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_bg2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Code" = "󰲋 "
"~" = " "

[git_branch]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_bg3)]($style)'

[git_status]
style = "bg:color_bg3"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_bg3)]($style)'
conflicted = " "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = " "
untracked = "? "
modified = " "
staged = " "
renamed = " "
deleted = " "

[nodejs]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[rust]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[golang]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[python]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg4)]($style)'

[kubernetes]
symbol = "󱃾"
style = "bg:color_bg4"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg4)]($style)'
disabled = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold color_green)'
error_symbol = '[❯](bold color_red)'
vimcmd_symbol = '[❮](bold color_green)'
